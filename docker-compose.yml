version: '3.8'

services:
  redis:
    image: redis:alpine
    container_name: voice_clone_redis
    ports:
      - "6379:6379"
    restart: unless-stopped

  minio:
    image: minio/minio
    container_name: voice_clone_s3_local
    ports:
      - "9000:9000"       # Port cho Backend và App Mobile gọi tới
      - "9001:9001"       # Port cho giao diện Web Console để em quản lý file
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadminpassword
    command: server /data --console-address ":9001"
    restart: unless-stopped